name: 'Deploy to EC2'
description: 'Deploy application to EC2 instance with health checks'

inputs:
  instance-id:
    description: 'EC2 instance ID'
    required: true
  image-uri:
    description: 'Docker image URI'
    required: true
  aws-region:
    description: 'AWS region'
    required: true
  target-group-arn:
    description: 'Target group ARN'
    required: true
  aws-account-id:
    description: 'AWS account ID'
    required: true
  ssh-private-key:
    description: 'SSH private key for EC2'
    required: true
  sg-name:
    description: 'Security group name'
    required: true

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ inputs.aws-region }}

    - name: Get Github Actions IP
      id: ip
      uses: haythem/public-ip@v1.2

    - name: Add Github Actions IP to security group
      shell: bash
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-name ${{ inputs.sg-name }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
          --region "${{ inputs.aws-region }}" || true

    - name: Resolve EC2 host by Instance ID
      id: resolve-host
      shell: bash
      run: |
        set -euo pipefail

        echo "[Info] Checking EC2 instance: ${{ inputs.instance-id }}"

        # 인스턴스 상태 확인
        INSTANCE_STATE="$(aws ec2 describe-instances \
          --instance-ids "${{ inputs.instance-id }}" \
          --region "${{ inputs.aws-region }}" \
          --query 'Reservations[0].Instances[0].State.Name' \
          --output text 2>/dev/null || echo "not-found")"

        if [[ "${INSTANCE_STATE}" == "not-found" ]] || [[ -z "${INSTANCE_STATE}" ]]; then
          echo "❌ Error: Instance ${{ inputs.instance-id }} not found"
          exit 1
        fi

        echo "[Info] Instance state: ${INSTANCE_STATE}"

        if [[ "${INSTANCE_STATE}" != "running" ]]; then
          echo "⚠️  Warning: Instance is not in 'running' state. Current state: ${INSTANCE_STATE}"
        fi

        # PublicDnsName 확인
        EC2_HOST="$(aws ec2 describe-instances \
          --instance-ids "${{ inputs.instance-id }}" \
          --region "${{ inputs.aws-region }}" \
          --query 'Reservations[0].Instances[0].PublicDnsName' \
          --output text 2>/dev/null || echo "")"

        echo "[Info] PublicDnsName: ${EC2_HOST}"

        # PublicDnsName이 없거나 None이면 PublicIpAddress 확인
        if [[ -z "${EC2_HOST}" || "${EC2_HOST}" == "None" ]]; then
          EC2_HOST="$(aws ec2 describe-instances \
            --instance-ids "${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text 2>/dev/null || echo "")"
          echo "[Info] PublicIpAddress: ${EC2_HOST}"
        fi

        # 둘 다 없으면 PrivateIpAddress 확인 (대안)
        if [[ -z "${EC2_HOST}" || "${EC2_HOST}" == "None" ]]; then
          EC2_HOST="$(aws ec2 describe-instances \
            --instance-ids "${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'Reservations[0].Instances[0].PrivateIpAddress' \
            --output text 2>/dev/null || echo "")"
          echo "[Info] PrivateIpAddress (fallback): ${EC2_HOST}"
        fi

        # 모든 시도 실패 시 에러
        if [[ -z "${EC2_HOST}" || "${EC2_HOST}" == "None" ]]; then
          echo "❌ Error: Cannot resolve EC2 host (Instance ID: ${{ inputs.instance-id }})"
          echo "[Debug] Instance details:"
          aws ec2 describe-instances \
            --instance-ids "${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'Reservations[0].Instances[0].[State.Name,PublicDnsName,PublicIpAddress,PrivateIpAddress]' \
            --output table
          exit 1
        fi

        echo "✅ Resolved EC2_HOST=${EC2_HOST}"
        echo "EC2_HOST=${EC2_HOST}" >> "$GITHUB_ENV"
        echo "host=${EC2_HOST}" >> "$GITHUB_OUTPUT"

    - name: Setup SSH
      shell: bash
      env:
        EC2_HOST: ${{ steps.resolve-host.outputs.host }}
      run: |
        set -euo pipefail
        : "${EC2_HOST:?EC2_HOST is not set}"
        mkdir -p ~/.ssh
        printf "%s" "${{ inputs.ssh-private-key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H "${EC2_HOST}" >> ~/.ssh/known_hosts || {
          echo "❌ Error: Failed to scan SSH host key for ${EC2_HOST}"
          exit 1
        }

    - name: Drain instance from Target Group
      shell: bash
      run: |
        set -euo pipefail
        aws elbv2 deregister-targets \
          --target-group-arn "${{ inputs.target-group-arn }}" \
          --targets Id="${{ inputs.instance-id }}" \
          --region "${{ inputs.aws-region }}"

        echo "[Drain] Waiting state draining/unused..."
        for i in $(seq 1 30); do
          STATE="$(aws elbv2 describe-target-health \
            --target-group-arn "${{ inputs.target-group-arn }}" \
            --targets Id="${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'TargetHealthDescriptions[0].TargetHealth.State' \
            --output text 2>/dev/null || true)"
          echo "  - state=${STATE} (${i}/30)"
          if [[ "${STATE}" == "draining" || "${STATE}" == "unused" ]]; then
            break
          fi
          sleep 5
        done

    - name: Deploy on EC2 (pull/up + health checks)
      shell: bash
      env:
        EC2_HOST: ${{ steps.resolve-host.outputs.host }}
        IMAGE_URI: ${{ inputs.image-uri }}
        AWS_REGION: ${{ inputs.aws-region }}
        AWS_ACCOUNT_ID: ${{ inputs.aws-account-id }}
      run: |
        set -euo pipefail
        : "${IMAGE_URI:?IMAGE_URI is not set}"
        : "${EC2_HOST:?EC2_HOST is not set}"

        echo "[Deploy] IMAGE_URI=${IMAGE_URI}"

        ssh -i ~/.ssh/deploy_key \
          -o StrictHostKeyChecking=no \
          -o ServerAliveInterval=60 \
          -o ServerAliveCountMax=10 \
          -o ConnectTimeout=10 \
          ubuntu@"${EC2_HOST}" \
          "IMAGE_URI='${IMAGE_URI}' \
           AWS_REGION='${AWS_REGION}' \
           AWS_ACCOUNT_ID='${AWS_ACCOUNT_ID}' \
           bash -se" <<'EOS'
        set -euo pipefail
        : "${IMAGE_URI:?IMAGE_URI is not set}"
        : "${AWS_REGION:?AWS_REGION is not set}"
        : "${AWS_ACCOUNT_ID:?AWS_ACCOUNT_ID is not set}"

        cd ~/BE

        # EC2 인스턴스의 기존 .env 파일 사용 확인
        if [ ! -f .env ]; then
          echo "❌ Error: .env file not found in ~/BE"
          echo "Please create .env file on EC2 instance with required environment variables."
          exit 1
        fi

        echo "[Info] Using existing .env file from EC2 instance"
        echo '=== .env (masked) ==='
        cat .env | sed 's/DB_PASSWORD=.*/DB_PASSWORD=***/' | sed 's/JWT_ACCESS_SECRET=.*/JWT_ACCESS_SECRET=***/' | sed 's/JWT_REFRESH_SECRET=.*/JWT_REFRESH_SECRET=***/' || true

        # IMAGE_URI만 .env 파일에 추가/업데이트 (기존 .env 파일은 유지)
        ECR_REGISTRY="${IMAGE_URI%:*}"
        IMAGE_TAG="${IMAGE_URI##*:}"
        
        # .env 파일에 IMAGE_URI 관련 변수 추가/업데이트 (Linux sed 사용)
        if grep -q "^IMAGE_URI=" .env; then
          sed -i "s|^IMAGE_URI=.*|IMAGE_URI=${IMAGE_URI}|" .env
        else
          echo "IMAGE_URI=${IMAGE_URI}" >> .env
        fi
        
        if grep -q "^ECR_REGISTRY=" .env; then
          sed -i "s|^ECR_REGISTRY=.*|ECR_REGISTRY=${ECR_REGISTRY}|" .env
        else
          echo "ECR_REGISTRY=${ECR_REGISTRY}" >> .env
        fi
        
        if grep -q "^IMAGE_TAG=" .env; then
          sed -i "s|^IMAGE_TAG=.*|IMAGE_TAG=${IMAGE_TAG}|" .env
        else
          echo "IMAGE_TAG=${IMAGE_TAG}" >> .env
        fi

        # 디스크 공간 정리: 사용하지 않는 Docker 이미지, 컨테이너, 볼륨 정리
        echo "[Cleanup] Cleaning up unused Docker resources to free disk space..."
        sudo docker system df
        sudo docker image prune -a -f
        sudo docker container prune -f
        sudo docker volume prune -f
        sudo docker builder prune -a -f
        sudo docker system prune -a -f --volumes
        
        # 디스크 사용량 확인
        echo "[Info] Disk usage after cleanup:"
        df -h / | tail -1
        
        aws ecr get-login-password --region "${AWS_REGION}" \
          | sudo docker login --username AWS --password-stdin \
            "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

        sudo docker compose pull
        sudo docker compose up -d --remove-orphans
        
        echo "[Check] Waiting for container to be ready (10s)..."
        sleep 10
        
        echo "[Check] Container status:"
        sudo docker compose ps

        for i in $(seq 1 30); do
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 http://localhost:3000/health 2>&1 || echo "000")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "[Check] localhost health OK (attempt ${i}/30, HTTP ${HTTP_CODE})"
            exit 0
          fi
          echo "[Check] localhost health retry ${i}/30 (HTTP ${HTTP_CODE}, waiting 3s...)"
          sleep 3
        done

        echo "[Check] localhost health FAILED after 30 attempts"
        echo "[Check] Testing connectivity:"
        curl -v --max-time 5 http://localhost:3000/health || true
        echo ""
        echo "[Check] Container status:"
        sudo docker compose ps
        echo "[Check] Container health:"
        sudo docker inspect shm --format='{{json .State.Health}}' 2>/dev/null || echo "No health check configured"
        echo "[Check] Recent logs:"
        sudo docker compose logs --tail=200
        exit 1
        EOS

    - name: Re-register instance to Target Group
      shell: bash
      run: |
        set -euo pipefail
        aws elbv2 register-targets \
          --target-group-arn "${{ inputs.target-group-arn }}" \
          --targets Id="${{ inputs.instance-id }}" \
          --region "${{ inputs.aws-region }}"

    - name: Wait until Target Group becomes healthy (print reason on fail)
      shell: bash
      run: |
        set -euo pipefail
        echo "[TG] Waiting for healthy (max 90s)..."
        for i in $(seq 1 18); do
          STATE="$(aws elbv2 describe-target-health \
            --target-group-arn "${{ inputs.target-group-arn }}" \
            --targets Id="${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'TargetHealthDescriptions[0].TargetHealth.State' \
            --output text)"
          REASON="$(aws elbv2 describe-target-health \
            --target-group-arn "${{ inputs.target-group-arn }}" \
            --targets Id="${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'TargetHealthDescriptions[0].TargetHealth.Reason' \
            --output text)"
          DESC="$(aws elbv2 describe-target-health \
            --target-group-arn "${{ inputs.target-group-arn }}" \
            --targets Id="${{ inputs.instance-id }}" \
            --region "${{ inputs.aws-region }}" \
            --query 'TargetHealthDescriptions[0].TargetHealth.Description' \
            --output text)"
          echo "  - state=${STATE} (${i}/18) reason=${REASON} desc=${DESC}"
          if [[ "${STATE}" == "healthy" ]]; then
            echo "✅ Target healthy"
            exit 0
          fi
          sleep 5
        done
        echo "❌ Target not healthy. Full describe:"
        aws elbv2 describe-target-health \
          --target-group-arn "${{ inputs.target-group-arn }}" \
          --targets Id="${{ inputs.instance-id }}" \
          --region "${{ inputs.aws-region }}"
        exit 1

    - name: Remove Github Actions IP from security group
      if: always()
      shell: bash
      run: |
        set -euo pipefail
        echo "[Cleanup] Removing GitHub Actions IP from security group..."
        aws ec2 revoke-security-group-ingress \
          --group-name ${{ inputs.sg-name }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
          --region "${{ inputs.aws-region }}" 2>&1 || {
            echo "⚠️  Warning: Failed to remove IP (may already be removed or not exist)"
            # IP가 없어도 에러로 처리하지 않음
            exit 0
          }
        echo "✅ Successfully removed IP: ${{ steps.ip.outputs.ipv4 }}/32"

    - name: Cleanup SSH keys
      if: always()
      shell: bash
      run: |
        rm -f ~/.ssh/deploy_key ~/.ssh/known_hosts
