name: Build and Deploy to ECR/EC2

on:
  push:
    branches: [main]

concurrency:
  group: shm
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: shm
  TARGET_GROUP_ARN: arn:aws:elasticloadbalancing:ap-northeast-2:466279485907:targetgroup/SHM-TG/425397d34f4b782a
  AWS_ACCOUNT_ID: '466279485907'
  SLACK_WEBHOOK_URL: 'https://hooks.slack.com/services/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'

jobs:
  notify-deploy-start:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification - Deploy Started
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "🚀 배포 시작",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🚀 배포 시작"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*브랜치:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*커밋:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.git-sha.outputs.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작업:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*트리거:*\n${{ github.event.head_commit.message }}"
                    }
                  ]
                }
              ]
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}

  build-and-push:
    needs: notify-deploy-start
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.git-sha.outputs.sha }}
      image_uri: ${{ steps.image-uri.outputs.uri }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Github Actions IP
        id: ip
        uses: haythem/public-ip@v1.2

      - name: Add Github Actions IP to security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-name ${{ secrets.AWS_SG_NAME }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
            --region "${{ env.AWS_REGION }}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.git-sha.outputs.sha }}
        run: |
          set -euo pipefail
          docker build -t "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}" .
          docker tag  "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}" "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          docker push "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

      - name: Export IMAGE_URI
        id: image-uri
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.git-sha.outputs.sha }}" >> "$GITHUB_OUTPUT"

      - name: Remove Github Actions IP from security group
        if: always()
        run: |
          set -euo pipefail
          echo "[Cleanup] Removing GitHub Actions IP from security group..."
          aws ec2 revoke-security-group-ingress \
            --group-name ${{ secrets.AWS_SG_NAME }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ipv4 }}/32 \
            --region "${{ env.AWS_REGION }}" 2>&1 || {
              echo "⚠️  Warning: Failed to remove IP (may already be removed or not exist)"
              # IP가 없어도 에러로 처리하지 않음
              exit 0
            }
          echo "✅ Successfully removed IP: ${{ steps.ip.outputs.ipv4 }}/32"

      - name: Send Slack notification - Build Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "❌ 빌드 실패",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ 빌드 실패"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*브랜치:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*커밋:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.git-sha.outputs.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작업:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                    }
                  ]
                }
              ]
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}

  deploy-ec2-1:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        uses: ./.github/actions/deploy-ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          instance-id: ${{ secrets.FIRST_EC2_ID }}
          image-uri: ${{ needs.build-and-push.outputs.image_uri }}
          aws-region: ${{ env.AWS_REGION }}
          target-group-arn: ${{ env.TARGET_GROUP_ARN }}
          aws-account-id: ${{ env.AWS_ACCOUNT_ID }}
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          sg-name: ${{ secrets.AWS_SG_NAME }}

      - name: Send Slack notification - Deploy EC2-1 Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "❌ EC2-1 배포 실패",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ EC2-1 배포 실패"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*인스턴스:*\nEC2-1"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*이미지:*\n${{ needs.build-and-push.outputs.image_uri }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작업:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                    }
                  ]
                }
              ]
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}

  deploy-ec2-2:
    needs: [build-and-push, deploy-ec2-1]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to EC2
        uses: ./.github/actions/deploy-ec2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          instance-id: ${{ secrets.SECOND_EC2_ID }}
          image-uri: ${{ needs.build-and-push.outputs.image_uri }}
          aws-region: ${{ env.AWS_REGION }}
          target-group-arn: ${{ env.TARGET_GROUP_ARN }}
          aws-account-id: ${{ env.AWS_ACCOUNT_ID }}
          ssh-private-key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          sg-name: ${{ secrets.AWS_SG_NAME }}

      - name: Send Slack notification - Deploy EC2-2 Failed
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "❌ EC2-2 배포 실패",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "❌ EC2-2 배포 실패"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*인스턴스:*\nEC2-2"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*이미지:*\n${{ needs.build-and-push.outputs.image_uri }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작업:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                    }
                  ]
                }
              ]
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}

  notify-deploy-success:
    needs: [build-and-push, deploy-ec2-1, deploy-ec2-2]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Git SHA
        id: git-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Send Slack notification - Deploy Success
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{
              "text": "✅ 배포 성공",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "✅ 배포 성공"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*브랜치:*\n${{ github.ref_name }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*커밋:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ steps.git-sha.outputs.sha }}>"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*이미지:*\n${{ needs.build-and-push.outputs.image_uri }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*작업:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|워크플로우 보기>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*배포된 인스턴스:*\n• EC2-1\n• EC2-2"
                  }
                }
              ]
            }' \
            ${{ env.SLACK_WEBHOOK_URL }}
