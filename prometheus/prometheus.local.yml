# Prometheus 설정 (로컬 테스트용)
# docker-compose.monitoring.local.yml과 함께 사용

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'node-local'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          instance: 'local'
          node: 'node-local'

  - job_name: 'cadvisor-local'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          instance: 'local'
          node: 'node-local'
