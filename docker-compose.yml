services:
  app:
    image: ${IMAGE_URI}
    container_name: shm
    ports:
      - '3000:3000'
    restart: always

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: '3000'

    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/health']
      interval: 30s
      timeout: 1s
      retries: 3
      start_period: 40s

    networks:
      - shm-network

networks:
  shm-network:
    driver: bridge
