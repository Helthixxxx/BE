services:
  app:
    image: ${IMAGE_URI}
    container_name: helthix
    ports:
      - '3000:3000'
    restart: always

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: '3000'

    networks:
      - helthix-network

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: always
    network_mode: host
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - '8080:8080'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: always
    ports:
      - '9187:9187'
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=${PG_EXPORTER_SSLMODE:-require}"
      # 운영(RDS): PG_EXPORTER_SSLMODE 미설정 시 require
      # 로컬: .env에 PG_EXPORTER_SSLMODE=disable 설정
    networks:
      - helthix-network

networks:
  helthix-network:
    driver: bridge
